name: CI - Python Build & Test

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: self-hosted

    container:
      image: python:3.9

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Python Build & Test Composite Action
        uses: medica-dev-platform/github-common-actions/python-build-test@<branch-name>
        with:
          python-version: "3.9"
