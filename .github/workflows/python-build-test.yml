name: Test Python Action

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted

    container:
      image: python:3.9   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Python version
        run: python --version

      - name: Run reusable action
        uses: medica-dev-platform/github-common-actions/python-build-test@feature/python-build-test
